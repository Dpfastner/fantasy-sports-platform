name: Event Gameday Live Sync

on:
  schedule:
    # Every 5 minutes (GitHub Actions minimum interval).
    # Smart skip logic means most calls return instantly:
    # - No event games today? Skip instantly
    # - Outside game window (30min before → 4hr after)? Skip instantly
    # - In game window? Fetch ESPN, update scores/period/clock
    # For 1-minute updates, would need an external cron service (Upstash/EasyCron)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  event-gameday-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call event-gameday-sync endpoint
        run: |
          response=$(curl -s --location-trusted -o /tmp/sync-response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/event-gameday-sync")

          echo "Response: HTTP $response"
          cat /tmp/sync-response.txt | head -c 500
          echo ""

          if [ "$response" -ge 500 ] || [ "$response" -eq 401 ] || [ "$response" -eq 307 ]; then
            echo "Error: HTTP $response"
            exit 1
          fi
