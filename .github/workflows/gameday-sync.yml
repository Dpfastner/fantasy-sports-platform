name: Gameday Live Sync

on:
  # DISABLED until August 2026 CFB season — saves GitHub Actions minutes.
  # Re-enable by uncommenting the schedule below.
  # schedule:
  #   - cron: '* * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  gameday-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call gameday-sync endpoint
        run: |
          response=$(curl -s --location-trusted -o /tmp/sync-response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/gameday-sync")

          echo "Response: HTTP $response"
          cat /tmp/sync-response.txt | head -c 500
          echo ""

          if [ "$response" -ge 500 ] || [ "$response" -eq 401 ] || [ "$response" -eq 307 ]; then
            echo "Error: HTTP $response"
            exit 1
          fi
