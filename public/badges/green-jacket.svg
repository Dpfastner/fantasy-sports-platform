<svg viewBox="0 0 180 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d3520"/>
      <stop offset="22%" stop-color="#1a5c38"/>
      <stop offset="50%" stop-color="#1f6b42"/>
      <stop offset="78%" stop-color="#1a5c38"/>
      <stop offset="100%" stop-color="#0d3520"/>
    </linearGradient>
    <linearGradient id="jSleeve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d3520"/>
      <stop offset="60%" stop-color="#165030"/>
      <stop offset="100%" stop-color="#0d3520"/>
    </linearGradient>
    <linearGradient id="jLapelL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#267a4c"/>
      <stop offset="100%" stop-color="#1a5c38"/>
    </linearGradient>
    <linearGradient id="jLapelR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#267a4c"/>
      <stop offset="100%" stop-color="#1a5c38"/>
    </linearGradient>
    <linearGradient id="jLining" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2820"/>
      <stop offset="40%" stop-color="#141e18"/>
      <stop offset="100%" stop-color="#0c1410"/>
    </linearGradient>
    <radialGradient id="btnGlow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#A8862A"/>
    </radialGradient>
  </defs>

  <!-- Left sleeve -->
  <path d="M 50,40 L 18,56 L 10,188 L 42,188 L 54,80 Z" fill="url(#jSleeve)"/>
  <line x1="18" y1="56" x2="22" y2="175" stroke="#0d3520" stroke-width="1.2" opacity="0.6"/>

  <!-- Right sleeve -->
  <path d="M 130,40 L 162,56 L 170,188 L 138,188 L 126,80 Z" fill="url(#jSleeve)"/>
  <line x1="162" y1="56" x2="158" y2="175" stroke="#0d3520" stroke-width="1.2" opacity="0.6"/>

  <!-- Main body -->
  <path d="M 46,38 L 134,38 L 150,222 L 30,222 Z" fill="url(#jBody)"/>

  <!-- Dark inner lining -->
  <path d="M 70,38 L 90,118 L 110,38 L 90,50 Z" fill="url(#jLining)"/>

  <!-- Lining folds -->
  <line x1="83" y1="46" x2="87" y2="115" stroke="#0c1410" stroke-width="0.6" opacity="0.55"/>
  <line x1="90" y1="50" x2="90" y2="118" stroke="#0c1410" stroke-width="0.6" opacity="0.4"/>
  <line x1="97" y1="46" x2="93" y2="115" stroke="#0c1410" stroke-width="0.6" opacity="0.55"/>

  <!-- Gold piping -->
  <path d="M 70,38 L 90,118" stroke="#C9A84C" stroke-width="0.8" opacity="0.4" fill="none"/>
  <path d="M 110,38 L 90,118" stroke="#C9A84C" stroke-width="0.8" opacity="0.4" fill="none"/>

  <!-- Lapels -->
  <path d="M 46,38 L 70,38 L 72,42 L 90,118 L 58,178 L 36,178 L 46,38" fill="url(#jLapelL)"/>
  <path d="M 70,38 L 72,42 L 90,118" fill="none" stroke="#0d3520" stroke-width="1.2" opacity="0.5"/>
  <path d="M 134,38 L 110,38 L 108,42 L 90,118 L 122,178 L 144,178 L 134,38" fill="url(#jLapelR)"/>
  <path d="M 110,38 L 108,42 L 90,118" fill="none" stroke="#0d3520" stroke-width="1.2" opacity="0.5"/>

  <!-- Collar -->
  <path d="M 68,38 L 78,52 L 90,46 L 102,52 L 112,38" fill="#1a5c38" stroke="#0d3520" stroke-width="1.2"/>

  <!-- Breast pocket -->
  <rect x="52" y="94" width="24" height="15" rx="1.5" fill="#0d3520" opacity="0.55"/>
  <rect x="52" y="92" width="24" height="3" rx="1" fill="#C9A84C" opacity="0.55"/>

  <!-- Buttons -->
  <circle cx="90" cy="130" r="4.5" fill="#A8862A"/>
  <circle cx="90" cy="130" r="3.5" fill="url(#btnGlow)"/>
  <circle cx="89" cy="129" r="1.2" fill="#E8C96A" opacity="0.7"/>

  <circle cx="90" cy="152" r="4.5" fill="#A8862A"/>
  <circle cx="90" cy="152" r="3.5" fill="url(#btnGlow)"/>
  <circle cx="89" cy="151" r="1.2" fill="#E8C96A" opacity="0.7"/>

  <circle cx="90" cy="173" r="4.5" fill="#A8862A"/>
  <circle cx="90" cy="173" r="3.5" fill="url(#btnGlow)"/>
  <circle cx="89" cy="172" r="1.2" fill="#E8C96A" opacity="0.7"/>

  <circle cx="90" cy="193" r="4.5" fill="#A8862A"/>
  <circle cx="90" cy="193" r="3.5" fill="url(#btnGlow)"/>
  <circle cx="89" cy="192" r="1.2" fill="#E8C96A" opacity="0.7"/>

  <circle cx="90" cy="212" r="4.5" fill="#A8862A"/>
  <circle cx="90" cy="212" r="3.5" fill="url(#btnGlow)"/>
  <circle cx="89" cy="211" r="1.2" fill="#E8C96A" opacity="0.7"/>

  <!-- Pocket square -->
  <path d="M 54,92 L 58,88 L 64,90 L 70,88 L 74,92" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.45"/>

  <!-- Shoulder seams -->
  <line x1="46" y1="38" x2="40" y2="65" stroke="#0d3520" stroke-width="1.5" opacity="0.45"/>
  <line x1="134" y1="38" x2="140" y2="65" stroke="#0d3520" stroke-width="1.5" opacity="0.45"/>
  <line x1="90" y1="118" x2="90" y2="222" stroke="#0d3520" stroke-width="0.8" opacity="0.3"/>
  <path d="M 30,222 L 150,222" stroke="#0d3520" stroke-width="1.5" opacity="0.4"/>
</svg>
